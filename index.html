<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YB Photos | Nature Photography</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* עיצוב כללי משופר */
:root {
  --bg: #FAFAF8; --text-primary: #1A1A18; --accent: #2D5A3D;
}
body { 
    font-family: 'Heebo', 'Assistant', sans-serif; 
    background-color: var(--bg); 
    color: var(--text-primary);
    margin: 0;
}

/* אנימציית לחיצה לכפתורים */
button, .clickable {
    transition: transform 0.1s ease;
}
button:active {
    transform: scale(0.95);
}

/* כפתור הורדה מעוצב */
.download-btn-fancy {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--accent);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    margin-top: 15px;
    box-shadow: 0 4px 15px rgba(45, 90, 61, 0.3);
}

/* אזור גרירת קבצים */
.drop-zone {
    border: 2px dashed #ccc;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.3s;
}
.drop-zone.over {
    background: #e1e1e1;
    border-color: var(--accent);
}

/* אנימציית טעינה */
.spinner {
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top: 3px solid #fff;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-left: 8px;
}
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<script>
// --- לוגיקה חדשה לקטגוריות ---
async function handleCategoryChange(select) {
    if (select.value === 'NEW_CAT') {
        const newCat = prompt("הכנס שם לקטגוריה החדשה:");
        if (newCat) {
            const option = document.createElement("option");
            option.value = newCat;
            option.text = newCat;
            select.add(option, select.options[select.options.length - 1]);
            select.value = newCat;
        } else {
            select.selectedIndex = 0;
        }
    }
}

// --- לוגיקה ל-Drag & Drop ---
function initDragDrop() {
    const zone = document.getElementById('dropZone');
    if(!zone) return;
    ['dragover', 'dragleave', 'drop'].forEach(name => {
        zone.addEventListener(name, e => {
            e.preventDefault();
            zone.classList.toggle('over', name === 'dragover');
        });
    });
    zone.addEventListener('drop', e => {
        const file = e.dataTransfer.files[0];
        if(file) document.getElementById('fileInput').files = e.dataTransfer.files;
    });
}

// --- פונקציית העלאה מעודכנת עם לואדר ---
window._upload = async function() {
    const btn = document.getElementById('uploadBtn');
    const originalText = btn.innerHTML;
    
    // הפעלת לואדר
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> מעלה...';

    // ... כאן נכנס הקוד של Firebase (העלאה + המתנה ל-Thumbnail כפי שסידרנו קודם) ...
    
    // בסיום:
    // btn.disabled = false;
    // btn.innerHTML = originalText;
};

// עדכון פוטר
document.addEventListener('DOMContentLoaded', () => {
    const footer = document.querySelector('footer p');
    if(footer) footer.innerHTML = '© כל הזכויות שמורות ל-YB Studio 2026';
    initDragDrop();
});
</script>
</body>
</html>
